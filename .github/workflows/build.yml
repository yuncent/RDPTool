name: RDPTool-Release

on:
  push:
    branches: [ "main" ]  # 推送到 main 分支触发
    tags: [ "v*" ]        # 推送以 v 开头的标签（如 v1.0）时触发 Release

env:
  # 强制使用 Node.js 24 运行 Actions，消除弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # 授予任务写入权限，这是创建 Release 的核心
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install MinGW (Cross Compiler)
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64

    - name: Compile Win32 EXE
      # 使用 25px 黄金间距源码进行静态编译
      run: |
        x86_64-w64-mingw32-g++ RDPTool.cpp -o RDPTool.exe -O2 -mwindows -static -ladvapi32 -lshell32

    - name: Auto Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: RDPTool.exe
        # 如果是因为推送代码触发，则使用 run_number 作为临时标签
        # 如果是因为推送标签触发，则直接使用该标签名
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
        name: RDPTool Release ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
        body: |
          RDP 端口一键修改工具 - 自动编译版
          - 左右边距：25px
          - 控件间距：25px
          - 环境：Win32 API / 静态链接
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
