name: Fast-Build-Win32

on:
  push:
    branches: [ "main" ]

jobs:
  cross-build:
    # 用 Linux 环境跑 Windows 编译
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install MinGW
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64

    - name: Compile to .exe
      # 使用交叉编译器 x86_64-w64-mingw32-g++
      run: |
        x86_64-w64-mingw32-g++ RDPTool.cpp -o RDPTool.exe -O2 -mwindows -static -ladvapi32 -lshell32

    - name: Archive Production
      uses: actions/upload-artifact@v4
      with:
        name: RDPTool-Release
        path: RDPTool.exe
